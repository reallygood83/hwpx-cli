name: Deploy Sphinx docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  check-pages:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}
    steps:
      - name: Detect GitHub Pages availability
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput("enabled", "true");
            } catch (error) {
              if (error.status === 404) {
                core.info("GitHub Pages is not enabled for this repository. Skipping deploy job.");
                core.setOutput("enabled", "false");
                return;
              }
              throw error;
            }

  build:
    needs: check-pages
    if: needs.check-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install documentation requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
      - name: Build documentation
        run: sphinx-build -b html docs docs/_build/html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: [check-pages, build]
    if: needs.check-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  pages-disabled-notice:
    needs: check-pages
    if: needs.check-pages.outputs.enabled != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice
        run: |
          echo "GitHub Pages가 비활성화되어 docs 배포를 건너뜁니다."
          echo "설정 위치: https://github.com/${{ github.repository }}/settings/pages"
